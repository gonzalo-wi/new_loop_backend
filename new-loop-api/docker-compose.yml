services:
  app:
    build: .
    container_name: loop-api-app
    # Comparte la red del servidor: así el contenedor alcanza la base y Aguas
    # igual que lo hace el host (evita el problema de ruteo del bridge de Docker).
    network_mode: host
    # Persiste los APKs publicados aunque se reconstruya la imagen.
    # Guardados en homologacion/app/apk-storage (sibling de backend/frontend/logs).
    # docker-compose.yml vive en homologacion/backend/new_loop_backend/new-loop-api/,
    # por eso hay que subir 3 niveles para llegar a homologacion/.
    volumes:
      - ../../../app/apk-storage:/app/apk-storage
    environment:
      # Con network_mode host no hay mapeo de puertos: la app escucha directo en este puerto del server
      SERVER_PORT: ${PORT:-8096}
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      AGUAS_BASE_URL: ${AGUAS_BASE_URL:-http://192.168.0.12}
      AGUAS_EQUIPMENT_BASE_URL: ${AGUAS_EQUIPMENT_BASE_URL:-http://192.168.0.58}
      POWERFLEET_BASE_URL: ${POWERFLEET_BASE_URL:-https://www.monitoreodeflotas.com.ar/Fleetcore.Api}
      POWERFLEET_USERNAME: ${POWERFLEET_USERNAME}
      POWERFLEET_PASSWORD: ${POWERFLEET_PASSWORD}
      APK_STORAGE_PATH: /app/apk-storage
    restart: unless-stopped
